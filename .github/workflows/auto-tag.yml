name: Auto Tag Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and create GitHub Release
    # Only run if the PR was merged and the head branch is a release/* branch.
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -v ./...

      - name: Extract version from branch name
        id: extract_version
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH_NAME#release/}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected vX.Y.Z, e.g. v0.3.0)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Extracted version: $VERSION"

      - name: Check if tag already exists
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi
          echo "✅ Tag $VERSION does not exist, safe to create"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "✅ Created and pushed tag: $VERSION"

      - name: Create GitHub Release
        # Same job as the tag push — sidesteps the GITHUB_TOKEN cascade
        # limitation (a tag push by GITHUB_TOKEN does NOT trigger a separate
        # `on: push: tags` workflow). By running here we don't need a PAT or
        # a GitHub App token.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          echo "✅ Published GitHub Release: $VERSION"

      - name: Delete release branch (best effort)
        # GitHub auto-deletes merged branches if the repo has that setting
        # enabled, so this is a no-op in that case. Don't fail the workflow
        # when the branch is already gone.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh pr view ${{ github.event.pull_request.number }} --json headRefName -q .headRefName)
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH"
            echo "✅ Deleted release branch: $BRANCH"
          else
            echo "ℹ️  Release branch $BRANCH already removed (likely auto-deleted on merge)"
          fi
