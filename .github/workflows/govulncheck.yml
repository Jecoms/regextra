name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 UTC — catches vulnerabilities published after the last code change
    - cron: '0 9 * * 1'

permissions:
  contents: read

concurrency:
  group: govulncheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    # Don't run on fork PRs (no token/secret exposure); same-repo + push/schedule still run.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Read-only checkout: don't leave the token in local git config where
          # PR-controlled code (govulncheck builds the module) could reach it.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          # govulncheck@latest pulls golang.org/x/vuln >= v1.3.0 which requires
          # Go ≥ 1.25 to build. The library still targets Go 1.24, but the
          # scanner toolchain is independent of that.
          go-version: '1.25'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
