name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod stays at 1.24 (the floor for consumers). Matrix tests against
        # the floor + the two newest toolchains so we catch regressions on new
        # Go without raising the consumer floor.
        go-version: ['1.24', '1.25', '1.26']
    
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    # Fuzz only on the floor toolchain — running on every matrix leg
    # multiplies CI minutes without proportional coverage gain.
    # Each target gets a 10s budget; the seed corpus runs unconditionally
    # via the regular `go test` step above on every matrix leg.
    - name: Fuzz Unmarshal type conversions
      if: matrix.go-version == '1.24'
      run: |
        for fz in FuzzFindNamed FuzzNamedGroups FuzzUnmarshalInt FuzzUnmarshalUint FuzzUnmarshalFloat FuzzUnmarshalBool; do
          echo "::group::go test -fuzz=^$fz$ -fuzztime=10s"
          go test -run='^$' -fuzz="^$fz$" -fuzztime=10s ./...
          echo "::endgroup::"
        done

    - name: Enforce coverage threshold
      env:
        # Floor below which the build fails. Current baseline is ~87.6%; this
        # leaves ~3 points of slack to absorb small refactors without forcing
        # tests on every micro-PR.
        MIN_COVERAGE: '85.0'
      run: |
        set -euo pipefail
        total=$(go tool cover -func=coverage.txt | awk '/^total:/ {print $3}' | tr -d '%')
        echo "Total coverage: ${total}%"
        echo "Minimum:        ${MIN_COVERAGE}%"
        awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit (t+0 < m+0) ? 1 : 0 }' || {
          echo "::error::Coverage ${total}% is below the required minimum ${MIN_COVERAGE}%."
          exit 1
        }
        echo "✓ Coverage meets the threshold."

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: '1.24'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
      with:
        version: latest

  vet:
    name: Vet
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: '1.24'

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted:"
          gofmt -s -d .
          exit 1
        fi
