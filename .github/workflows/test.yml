name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    # Don't run on fork PRs (no token/secret exposure); same-repo + push still run.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod stays at 1.24 (the floor for consumers). Matrix tests against
        # the floor + the two newest toolchains so we catch regressions on new
        # Go without raising the consumer floor.
        go-version: ['1.24', '1.25', '1.26']
    
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        # Read-only checkout: don't leave the token in local git config where
        # PR-controlled code (go test/vet/lint) could reach it.
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    # Fuzz only on the floor toolchain — running on every matrix leg
    # multiplies CI minutes without proportional coverage gain.
    # Each target gets a 10s budget; the seed corpus runs unconditionally
    # via the regular `go test` step above on every matrix leg.
    - name: Fuzz Unmarshal type conversions
      if: matrix.go-version == '1.24'
      run: |
        for fz in FuzzFindNamed FuzzNamedGroups FuzzUnmarshalInt FuzzUnmarshalUint FuzzUnmarshalFloat FuzzUnmarshalBool; do
          echo "::group::go test -fuzz=^$fz$ -fuzztime=10s"
          go test -run='^$' -fuzz="^$fz$" -fuzztime=10s ./...
          echo "::endgroup::"
        done

    - name: Enforce coverage threshold
      env:
        # Floor below which the build fails. Real baseline is ~97%; this leaves
        # ~5 points of slack to absorb small refactors without forcing tests on
        # every micro-PR. Don't set it so high a minor change turns CI red.
        MIN_COVERAGE: '92.0'
      run: |
        set -euo pipefail
        total=$(go tool cover -func=coverage.txt | awk '/^total:/ {print $3}' | tr -d '%')
        echo "Total coverage: ${total}%"
        echo "Minimum:        ${MIN_COVERAGE}%"
        awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit (t+0 < m+0) ? 1 : 0 }' || {
          echo "::error::Coverage ${total}% is below the required minimum ${MIN_COVERAGE}%."
          exit 1
        }
        echo "✓ Coverage meets the threshold."

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        files: ./coverage.txt
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Lint
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        # Read-only checkout: don't leave the token in local git config where
        # PR-controlled code (go test/vet/lint) could reach it.
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        go-version: '1.24'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
      with:
        # Pin instead of `latest` so a new golangci-lint release can't turn
        # CI red without a corresponding bump PR.
        version: v2.12.1

  vet:
    name: Vet
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        # Read-only checkout: don't leave the token in local git config where
        # PR-controlled code (go test/vet/lint) could reach it.
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        go-version: '1.24'

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted:"
          gofmt -s -d .
          exit 1
        fi
